apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:

      # força rodar no nodepool de observabilidade
      nodeSelector:
        cloud.google.com/gke-nodepool: observability-pool

      # corrige vm.max_map_count
      initContainers:
      - name: sysctl
        image: busybox
        command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
        securityContext:
          privileged: true

      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0

        ports:
        - containerPort: 9200
        - containerPort: 9300

        env:
        - name: discovery.type
          value: single-node

        - name: xpack.security.enabled
          value: "false"

        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"

        resources:
          requests:
            cpu: "200m"
            memory: "700Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"

        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data

      volumes:
      - name: elasticsearch-data
        persistentVolumeClaim:
          claimName: elasticsearch-pvc

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: logging
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300

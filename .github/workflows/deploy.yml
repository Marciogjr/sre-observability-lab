name: Deploy to GKE

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: sre-lab-489313
      CLUSTER_NAME: sre-cluster
      CLUSTER_ZONE: us-central1-a
      IMAGE: sre-observability-app
      REPOSITORY: sre-repo
      REGION: us-central1
      NAMESPACE: sre-lab

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: projects/1056238819180/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@sre-lab-489313.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME \
          --zone $CLUSTER_ZONE \
          --project $PROJECT_ID

      # Cria namespace se não existir
      - name: Ensure namespace exists
        run: |
          kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE

      # aplica todos os manifestos depois que o namespace estiver criado
      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply -f k8s/ -n $NAMESPACE
          kubectl apply -f logging/ -n $NAMESPACE

      # Atualiza a imagem da aplicação no deployment existente
      - name: Update deployment image
        run: |
          kubectl set image deployment/sre-app \
            sre-app=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            -n $NAMESPACE

      # Garante que o rollout finalizou e os pods estão prontos
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/sre-app -n $NAMESPACE

      # Lista os pods para verificação final
      - name: List pods
        run: |
          kubectl get pods -n $NAMESPACE -o wide

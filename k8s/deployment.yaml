apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
      - name: sre-app
        image: us-central1-docker.pkg.dev/sre-lab-489313/sre-repo/sre-observability-app:latest
        ports:
        - containerPort: 8080
